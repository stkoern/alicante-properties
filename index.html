<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alicante Property Search — 3 April 2026</title>
<style>
  :root {
    --bg: #f8f7f4;
    --card: #ffffff;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --fav: #f59e0b;
    --fav-light: #fef3c7;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --green: #059669;
    --red: #dc2626;
    --tag-new: #dcfce7;
    --tag-new-text: #166534;
    --tag-drop: #fee2e2;
    --tag-drop-text: #991b1b;
    --tag-excl: #f3e8ff;
    --tag-excl-text: #6b21a8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }

  header { background: white; border-bottom: 1px solid var(--border); padding: 20px 32px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 22px; font-weight: 700; }
  header p { color: var(--muted); font-size: 14px; margin-top: 2px; }

  .toolbar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; padding: 16px 32px; background: white; border-bottom: 1px solid var(--border); position: sticky; top: 68px; z-index: 99; }
  .toolbar .filter-group { display: flex; gap: 6px; align-items: center; }
  .toolbar label { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .toolbar select, .toolbar input { padding: 7px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: white; }
  .toolbar input[type="text"] { width: 180px; }

  .view-toggle { display: flex; gap: 4px; margin-left: auto; }
  .view-toggle button { padding: 7px 16px; border: 1px solid var(--border); background: white; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--muted); transition: all 0.15s; }
  .view-toggle button:first-child { border-radius: 8px 0 0 8px; }
  .view-toggle button:last-child { border-radius: 0 8px 8px 0; }
  .view-toggle button.active { background: var(--accent); color: white; border-color: var(--accent); }

  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px 32px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: all 0.2s; cursor: pointer; }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-2px); }

  .card-image { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #f0f0f0; }

  .card-content { padding: 16px; }
  .card-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .card-price { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .card-details { display: flex; gap: 12px; font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .card-details span { display: flex; align-items: center; gap: 4px; }

  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .tag { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .tag-new { background: var(--tag-new); color: var(--tag-new-text); }
  .tag-drop { background: var(--tag-drop); color: var(--tag-drop-text); }
  .tag-excl { background: var(--tag-excl); color: var(--tag-excl-text); }

  .fav-btn { background: white; border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
  .fav-btn.active { background: var(--fav-light); border-color: var(--fav); color: var(--fav); }

  .list-view { padding: 0; }
  .list-row { display: grid; grid-template-columns: 120px 1fr 120px; gap: 20px; padding: 16px 32px; border-bottom: 1px solid var(--border); align-items: center; cursor: pointer; transition: all 0.2s; }
  .list-row:hover { background: var(--bg); }
  .list-row img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; }
  .list-row-info { display: flex; flex-direction: column; gap: 6px; }
  .list-row-title { font-weight: 700; font-size: 16px; }
  .list-row-meta { font-size: 13px; color: var(--muted); }

  @media (max-width: 768px) {
    .card-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    .toolbar { flex-direction: column; align-items: flex-start; }
    .view-toggle { margin-left: 0; margin-top: 12px; }
  }
</style>
</head>

<header>

  <div class="filter-group">

  </div>

  <div class="view-toggle">
    <button class="active" onclick="setView('grid')">Grid</button>

</div>

];

let favorites = [];
let currentView = 'grid';

function setView(view) {
  currentView = view;
  document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderCards();
  const container = document.getElementById('cardGrid');
  container.className = view === 'list' ? 'list-view' : 'card-grid';
}

function applyFilters() {
  let filtered = properties;
  
  const typeFilter = document.getElementById('typeFilter').value;
  const priceFilter = document.getElementById('priceFilter').value;
  const searchInput = document.getElementById('searchInput').value.toLowerCase();
  
  if (typeFilter) {
    filtered = filtered.filter(p => p.type === typeFilter);
  }
  
  if (priceFilter) {
    if (priceFilter === '0-200000') filtered = filtered.filter(p => p.price < 200000);
    if (priceFilter === '200000-400000') filtered = filtered.filter(p => p.price >= 200000 && p.price < 400000);
    if (priceFilter === '400000-600000') filtered = filtered.filter(p => p.price >= 400000 && p.price < 600000);
    if (priceFilter === '600000+') filtered = filtered.filter(p => p.price >= 600000);
  }
  
  if (searchInput) {
    filtered = filtered.filter(p => p.address.toLowerCase().includes(searchInput) || p.title.toLowerCase().includes(searchInput));
  }
  
  return filtered;
}

function toggleFavorite(id) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(f => f !== id);
  } else {
    favorites.push(id);
  }
  renderCards();
}

function renderCards() {
  const filtered = applyFilters();
  const container = document.getElementById('cardGrid');
  container.innerHTML = filtered.map(property => {
    const isFav = favorites.includes(property.id);
    const tagHtml = property.tags.map(tag => `<span class="tag tag-${tag}">${tag === 'new' ? 'New' : tag === 'drop' ? 'Price Drop' : 'Exclusive'}</span>`).join('');
    
    if (currentView === 'list') {
      return `
        <div class="list-row">
          <img src="${property.image}" alt="${property.title}">
          <div class="list-row-info">
            <div class="list-row-title">${property.title}</div>
            <div class="list-row-meta">${property.beds} beds • ${property.baths} baths • ${property.sqm} m²</div>
            <div class="list-row-meta">${property.address}</div>
            <div class="tags">${tagHtml}</div>
          </div>
          <div>
            <div style="font-weight: 700; margin-bottom: 12px;">€${property.price.toLocaleString()}</div>
            <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite(${property.id})">★ Favorite</button>
          </div>
        </div>
      `;
    }
    
    return `
      <div class="card">
        <img src="${property.image}" alt="${property.title}" class="card-image">
        <div class="card-content">
          <div class="card-title">${property.title}</div>
          <div class="card-price">€${property.price.toLocaleString()}</div>
          <div class="card-details">
            <span>🛏️ ${property.beds}</span>
            <span>🚿 ${property.baths}</span>
            <span>📐 ${property.sqm}m²</span>
          </div>
          <div style="font-size: 12px; color: var(--muted); margin-bottom: 12px;">${property.address}</div>
          <div class="tags">${tagHtml}</div>
          <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite(${property.id})">★ Favorite</button>
        </div>
      </div>
    `;
  }).join('');
}

document.getElementById('typeFilter').addEventListener('change', renderCards);
document.getElementById('priceFilter').addEventListener('change', renderCards);
document.getElementById('searchInput').addEventListener('input', renderCards);

renderCards();
</script>
